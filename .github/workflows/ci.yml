name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-contracts:
    name: Rust contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.85.1
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Audit Rust advisories, licenses and sources
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
      - name: Verify renderer-independent contracts
        run: ./scripts/check-rust.sh

  dry-run-portability:
    name: Portable dry-run
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Reject contributor-specific paths and compile scripts
        run: python3 scripts/check-dry-run-portability.py
      - name: Parse workflow module
        run: node --check dry-run/scripts/workflow-dry-run.js

  brand-assets:
    name: Deterministic brand assets
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install local rendering tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends librsvg2-bin libxml2-utils imagemagick
      - name: Generate and verify assets twice
        run: |
          set -euo pipefail
          ./scripts/generate-assets.sh
          find assets/brand apps/web/assets proofs/brand -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum > /tmp/assets-first.sha256
          ./scripts/generate-assets.sh
          find assets/brand apps/web/assets proofs/brand -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum > /tmp/assets-second.sha256
          diff -u /tmp/assets-first.sha256 /tmp/assets-second.sha256
